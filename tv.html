<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web FM - TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4f46e5', // Indigo-600
                        secondary: '#db2777', // Pink-600
                        surface: '#ffffff',
                        background: '#f8fafc', // Slate-50
                        text: '#0f172a', // Slate-900
                    },
                }
            }
        }
    </script>
</head>

<body
    class="bg-gradient-to-br from-purple-50 via-pink-50 to-cyan-50 text-text font-sans min-h-screen flex flex-col relative overflow-hidden">

    <!-- Navigation -->
    <nav
        class="relative z-50 w-full px-6 py-4 flex justify-between items-center backdrop-blur-md bg-white/60 border-b border-purple-200/50 sticky top-0 shadow-sm">
        <a href="index.html"
            class="text-3xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary via-secondary to-accent hover:scale-105 transition-transform duration-300">
            Web FM
        </a>

        <div class="hidden md:flex space-x-8">
            <a href="index.html"
                class="nav-link text-slate-500 font-medium hover:text-primary transition-colors relative group">
                Home
                <span
                    class="absolute bottom-0 left-0 w-full h-0.5 bg-gradient-to-r from-primary to-secondary transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
            </a>
            <a href="tv.html"
                class="nav-link active text-slate-900 font-semibold hover:text-primary transition-colors relative group">
                TV
                <span
                    class="absolute bottom-0 left-0 w-full h-0.5 bg-gradient-to-r from-primary to-secondary transform scale-x-100 transition-transform origin-left"></span>
            </a>
            <a href="about.html"
                class="nav-link text-slate-500 font-medium hover:text-primary transition-colors relative group">
                About
                <span
                    class="absolute bottom-0 left-0 w-full h-0.5 bg-gradient-to-r from-primary to-secondary transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
            </a>
        </div>

        <button id="mobile-menu-btn"
            class="md:hidden text-slate-800 text-2xl focus:outline-none hover:text-primary transition-colors">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu"
        class="fixed inset-0 z-40 bg-white/95 backdrop-blur-xl transform translate-x-full transition-transform duration-300 md:hidden flex flex-col justify-center items-center space-y-8 shadow-2xl">
        <button id="close-menu-btn"
            class="absolute top-6 right-6 text-slate-800 text-3xl hover:rotate-90 transition-transform">
            <i class="fas fa-times"></i>
        </button>
        <a href="index.html" class="text-3xl font-bold text-slate-500 hover:text-primary transition-colors">Home</a>
        <a href="tv.html" class="text-3xl font-bold text-slate-900 hover:text-primary transition-colors">TV</a>
        <a href="about.html" class="text-3xl font-bold text-slate-500 hover:text-primary transition-colors">About</a>
    </div>

    <!-- Content -->
    <main class="flex-grow flex flex-col items-center justify-center w-full h-full relative p-4 bg-slate-50">

        <div
            class="w-full max-w-6xl h-[80vh] bg-white rounded-3xl overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.1)] border border-white relative group">

            <!-- Loading / Placeholder -->
            <div class="absolute inset-0 flex flex-col items-center justify-center z-0 bg-slate-100">
                <i class="fas fa-tv text-6xl text-slate-300 mb-4 animate-pulse"></i>
                <p class="text-slate-400 font-medium">Connecting to Stream...</p>
                <a href="https://famelack.com" target="_blank"
                    class="mt-4 px-6 py-2 bg-white hover:bg-slate-50 border border-slate-200 shadow-sm rounded-full text-sm text-slate-500 transition-colors">
                    <i class="fas fa-external-link-alt mr-2 text-primary"></i> Open externally
                </a>
            </div>

            <!-- Iframe -->
            <iframe src="https://famelack.com" class="absolute inset-0 w-full h-full z-10" frameborder="0"
                allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>

        </div>

    </main>

    <!-- Mini Floating Player -->
    <div id="mini-player"
        class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] bg-white/90 backdrop-blur-xl border border-slate-200 rounded-full px-6 py-4 shadow-[0_10px_40px_rgba(0,0,0,0.15)] flex items-center gap-4 transition-all duration-300 hover:shadow-[0_10px_50px_rgba(79,70,229,0.25)] hover:scale-105">

        <!-- Status Indicator -->
        <div class="flex items-center gap-2">
            <span id="mini-status-dot" class="w-2 h-2 bg-red-500 rounded-full"></span>
            <span class="text-xs font-bold text-slate-600">Web FM</span>
        </div>

        <!-- Play/Pause Button -->
        <button id="mini-play-btn"
            class="w-12 h-12 rounded-full bg-gradient-to-br from-primary to-secondary text-white flex items-center justify-center shadow-lg shadow-primary/30 hover:shadow-primary/50 transition-all active:scale-95">
            <i class="fas fa-play pl-1 text-lg"></i>
        </button>

        <!-- Volume Control -->
        <div class="flex items-center gap-2">
            <i class="fas fa-volume-up text-slate-400 text-sm"></i>
            <input type="range" id="mini-volume" min="0" max="1" step="0.01" value="0.8"
                class="w-20 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-primary">
        </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="audio-player" preload="none">
        <source src="https://stream.zeno.fm/xg08hgda5qytv" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Footer -->
    <footer
        class="relative z-10 w-full py-8 text-center text-slate-400 text-sm border-t border-gray-200 mt-auto bg-white/50 backdrop-blur-sm">
        <p class="font-medium">© 2026 VS ENTERTAINMENT.</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
