<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web FM - Live Online Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#8b5cf6', // Purple-500
                        secondary: '#ec4899', // Pink-600
                        accent: '#06b6d4', // Cyan-500
                        surface: '#ffffff',
                        background: '#faf5ff', // Purple-50
                        text: '#0f172a', // Slate-900
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'blob': 'blob 7s infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'spin-slow': 'spin 8s linear infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-gradient-to-br from-purple-50 via-pink-50 to-cyan-50 text-text font-sans min-h-screen flex flex-col relative overflow-x-hidden selection:bg-primary selection:text-white">

    <!-- Background Effects -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div
            class="absolute top-0 left-1/4 w-96 h-96 bg-purple-300/30 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob">
        </div>
        <div
            class="absolute top-0 right-1/4 w-96 h-96 bg-pink-300/30 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000">
        </div>
        <div
            class="absolute -bottom-32 left-1/3 w-96 h-96 bg-cyan-300/30 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-4000">
        </div>
    </div>

    <!-- Navigation -->
    <nav
        class="relative z-50 w-full px-6 py-4 flex justify-between items-center backdrop-blur-md bg-white/60 border-b border-purple-200/50 sticky top-0 shadow-sm">
        <a href="index.html"
            class="text-3xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary via-secondary to-accent hover:scale-105 transition-transform duration-300">
            Web FM
        </a>

        <div class="hidden md:flex space-x-8">
            <a href="index.html"
                class="nav-link active text-slate-900 font-semibold hover:text-primary transition-colors relative group">
                Home
                <span
                    class="absolute bottom-0 left-0 w-full h-0.5 bg-gradient-to-r from-primary to-secondary transform scale-x-100 transition-transform origin-left"></span>
            </a>
            <a href="tv.html"
                class="nav-link text-slate-500 font-medium hover:text-primary transition-colors relative group">
                TV
                <span
                    class="absolute bottom-0 left-0 w-full h-0.5 bg-gradient-to-r from-primary to-secondary transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
            </a>
            <a href="about.html"
                class="nav-link text-slate-500 font-medium hover:text-primary transition-colors relative group">
                About
                <span
                    class="absolute bottom-0 left-0 w-full h-0.5 bg-gradient-to-r from-primary to-secondary transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></span>
            </a>
        </div>

        <button id="mobile-menu-btn"
            class="md:hidden text-slate-800 text-2xl focus:outline-none hover:text-primary transition-colors">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu"
        class="fixed inset-0 z-40 bg-white/95 backdrop-blur-xl transform translate-x-full transition-transform duration-300 md:hidden flex flex-col justify-center items-center space-y-8 shadow-2xl">
        <button id="close-menu-btn"
            class="absolute top-6 right-6 text-slate-800 text-3xl hover:rotate-90 transition-transform">
            <i class="fas fa-times"></i>
        </button>
        <a href="index.html" class="text-3xl font-bold text-slate-900 hover:text-primary transition-colors">Home</a>
        <a href="tv.html" class="text-3xl font-bold text-slate-500 hover:text-primary transition-colors">TV</a>
        <a href="about.html" class="text-3xl font-bold text-slate-500 hover:text-primary transition-colors">About</a>
    </div>

    <!-- Main Content -->
    <main class="relative z-10 flex-grow flex flex-col justify-center items-center px-4 py-8 text-center">

        <!-- Hero Title -->
        <h1 class="text-6xl md:text-8xl font-black mb-2 tracking-tight text-slate-900 drop-shadow-sm">
            Web <span
                class="text-transparent bg-clip-text bg-gradient-to-r from-primary via-secondary to-accent animate-gradient-x">FM</span>
        </h1>
        <p class="text-lg text-slate-600 max-w-2xl mb-12 font-medium">Your premium destination for live music.</p>

        <!-- New Vibrant Player Design -->
        <div class="w-full max-w-lg relative group">

            <!-- Main Player Card -->
            <div
                class="bg-gradient-to-br from-white/80 to-white/40 backdrop-blur-2xl border border-white/60 rounded-[3rem] p-8 shadow-[0_20px_60px_rgba(139,92,246,0.2)] relative overflow-hidden transition-all duration-500 hover:shadow-[0_30px_80px_rgba(139,92,246,0.3)] hover:-translate-y-2">

                <!-- Animated Background Gradient -->
                <div
                    class="absolute inset-0 bg-gradient-to-tr from-primary/5 via-secondary/5 to-accent/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                </div>

                <!-- Vinyl Disc Player -->
                <div class="relative mb-8 flex justify-center">

                    <!-- Status Badge -->
                    <div class="absolute -top-2 -right-2 z-20">
                        <span id="player-status-badge"
                            class="bg-red-100 text-red-600 text-xs font-bold px-3 py-1.5 rounded-full flex items-center gap-2 shadow-lg border-2 border-red-200 transition-all duration-300">
                            <span class="w-2 h-2 bg-current rounded-full"></span> OFFLINE
                        </span>
                    </div>

                    <!-- Vinyl Disc Container -->
                    <div class="relative w-56 h-56 group/vinyl">

                        <!-- Outer Ring -->
                        <div
                            class="absolute inset-0 rounded-full bg-gradient-to-br from-slate-800 via-slate-700 to-slate-900 shadow-[0_15px_40px_rgba(0,0,0,0.3)] border-4 border-white/20">
                        </div>

                        <!-- Grooves -->
                        <div class="absolute inset-4 rounded-full border-2 border-white/10"></div>
                        <div class="absolute inset-8 rounded-full border-2 border-white/10"></div>
                        <div class="absolute inset-12 rounded-full border-2 border-white/10"></div>

                        <!-- Center Label -->
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div
                                class="w-24 h-24 rounded-full bg-gradient-to-br from-primary via-secondary to-accent flex items-center justify-center shadow-xl">
                                <div class="w-20 h-20 rounded-full bg-white flex items-center justify-center">
                                    <i class="fas fa-music text-2xl text-primary"></i>
                                </div>
                            </div>
                        </div>

                        <!-- Spinning Animation Wrapper (only when playing) -->
                        <div id="vinyl-spinner" class="absolute inset-0 transition-transform duration-1000">
                            <!-- Reflection Effect -->
                            <div
                                class="absolute top-1/4 left-1/4 w-20 h-8 bg-white/20 rounded-full blur-xl transform -rotate-45">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex flex-col gap-6 relative z-10">

                    <!-- Main Play Button -->
                    <div class="flex justify-center items-center">
                        <button id="play-pause-btn"
                            class="w-24 h-24 rounded-full bg-gradient-to-br from-primary via-secondary to-accent text-white flex items-center justify-center text-4xl shadow-2xl shadow-primary/40 hover:shadow-primary/60 hover:scale-110 transition-all duration-300 active:scale-95 group relative overflow-hidden">
                            <div
                                class="absolute inset-0 bg-gradient-to-tr from-white/0 via-white/20 to-white/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700">
                            </div>
                            <i class="fas fa-play pl-2 transition-transform duration-300 relative z-10"></i>
                        </button>
                    </div>

                    <!-- Info & Volume -->
                    <div class="space-y-4">
                        <!-- Time -->
                        <div class="flex justify-between text-xs font-bold text-slate-400 tracking-widest uppercase">
                            <span id="current-time">00:00</span>
                            <span id="duration"
                                class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-accent">●
                                LIVE</span>
                        </div>

                        <!-- Volume -->
                        <div
                            class="flex items-center gap-3 bg-white/50 backdrop-blur-sm p-3 rounded-2xl border border-white/60 shadow-inner">
                            <button class="text-slate-400 hover:text-primary transition-colors"><i
                                    class="fas fa-volume-down"></i></button>
                            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8"
                                class="w-full h-2 bg-gradient-to-r from-primary/20 to-accent/20 rounded-lg appearance-none cursor-pointer slider-vibrant">
                            <button class="text-slate-400 hover:text-primary transition-colors"><i
                                    class="fas fa-volume-up"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Hidden Audio Element -->
        <audio id="audio-player" preload="none">
            <source src="https://stream.zeno.fm/xg08hgda5qytv" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <!-- Comment Section -->
        <div class="w-full max-w-4xl mt-16">

            <!-- Section Title -->
            <h2
                class="text-3xl font-bold text-center mb-8 text-transparent bg-clip-text bg-gradient-to-r from-primary via-secondary to-accent">
                Listener Comments
            </h2>

            <!-- Comment Form -->
            <div class="bg-white/60 backdrop-blur-xl border border-white/60 rounded-3xl p-6 shadow-xl mb-8">
                <form id="comment-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="comment-name" placeholder="Your Name" required
                            class="px-4 py-3 bg-white/70 border border-purple-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                        <input type="text" id="comment-country" placeholder="Country" required
                            class="px-4 py-3 bg-white/70 border border-purple-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>
                    <textarea id="comment-text" placeholder="Your message..." rows="3" required
                        class="w-full px-4 py-3 bg-white/70 border border-purple-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all resize-none"></textarea>
                    <button type="submit"
                        class="w-full md:w-auto px-8 py-3 bg-gradient-to-r from-primary via-secondary to-accent text-white font-bold rounded-xl shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300">
                        <i class="fas fa-paper-plane mr-2"></i> Send Comment
                    </button>
                </form>
            </div>

            <!-- Comments Carousel -->
            <div
                class="relative overflow-hidden bg-white/40 backdrop-blur-lg rounded-3xl p-8 border border-white/60 shadow-xl">
                <div id="comments-carousel" class="flex transition-transform duration-500 ease-in-out gap-6">
                    <!-- Default Comment -->
                    <div
                        class="min-w-full bg-gradient-to-br from-white/80 to-white/40 backdrop-blur-sm p-6 rounded-2xl border border-white/60 shadow-lg">
                        <div class="flex items-start gap-4">
                            <div
                                class="w-12 h-12 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white font-bold text-xl flex-shrink-0">
                                <i class="fas fa-user"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-2">
                                    <h4 class="font-bold text-slate-900">Web FM Team</h4>
                                    <span
                                        class="text-xs bg-primary/20 text-primary px-2 py-1 rounded-full font-semibold">
                                        <i class="fas fa-globe-americas mr-1"></i> Sri Lanka
                                    </span>
                                </div>
                                <p class="text-slate-600 leading-relaxed">
                                    Welcome to Web FM! Share your thoughts and greetings with our global community. 🎵
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Carousel Controls -->
                <div class="flex justify-center gap-3 mt-6">
                    <button id="prev-comment"
                        class="w-10 h-10 rounded-full bg-white/80 hover:bg-white border border-purple-200 text-primary transition-all hover:scale-110 shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div id="carousel-dots" class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-primary"></span>
                    </div>
                    <button id="next-comment"
                        class="w-10 h-10 rounded-full bg-white/80 hover:bg-white border border-purple-200 text-primary transition-all hover:scale-110 shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer
        class="relative z-10 w-full py-8 text-center text-slate-400 text-sm border-t border-purple-200/50 mt-auto bg-white/30 backdrop-blur-sm">
        <p class="font-medium">© 2026 VS ENTERTAINMENT.</p>
    </footer>

    <script src="script.js"></script>

    <!-- Vinyl Spinning Animation Script -->
    <script>
        // Add spinning animation to vinyl when playing
        const audioEl = document.getElementById('audio-player');
        const vinylSpinner = document.getElementById('vinyl-spinner');

        if (audioEl && vinylSpinner) {
            audioEl.addEventListener('playing', () => {
                vinylSpinner.style.animation = 'spin 3s linear infinite';
            });

            audioEl.addEventListener('pause', () => {
                vinylSpinner.style.animation = 'none';
            });

            audioEl.addEventListener('ended', () => {
                vinylSpinner.style.animation = 'none';
            });
        }
    </script>
</body>

</html>
